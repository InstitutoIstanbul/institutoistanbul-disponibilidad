<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscripción — Instituto İstanbul</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --naranja: #E8734A;
  --naranja-dark: #c75e38;
  --naranja-light: #fff3ee;
  --gris: #f4f4f4;
  --texto: #222;
  --texto-suave: #666;
  --borde: #e0e0e0;
  --error: #dc3545;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; min-height: 100vh; }
body { font-family: 'Nunito', sans-serif; background: #f4f4f4; color: var(--texto); font-size: 16px; }
.container { max-width: 600px; width: 100%; margin: 0 auto; background: #fff; min-height: 100vh; padding: 24px 20px 48px; }
.logo { display: block; max-width: 140px; margin-bottom: 20px; }
h1 { font-size: 24px; font-weight: 800; color: var(--naranja); margin-bottom: 4px; line-height: 1.2; }
.subtitulo { font-size: 15px; color: var(--texto-suave); margin-bottom: 28px; }
.seccion { margin-bottom: 24px; }
.seccion-titulo { font-size: 16px; font-weight: 700; color: var(--texto); margin-bottom: 10px; }
input[type=text], input[type=email], select {
  width: 100%; padding: 14px 16px;
  border: 2px solid var(--borde); border-radius: 10px;
  font-size: 16px; font-family: 'Nunito', sans-serif;
  color: var(--texto); background: #fff;
  -webkit-appearance: none; appearance: none;
  transition: border-color 0.2s;
}
input:focus, select:focus { outline: none; border-color: var(--naranja); }
input[readonly] { background: var(--gris); color: #999; }
.hint { font-size: 13px; color: #aaa; margin-top: 5px; }
.opcion-nivel { border: 2px solid var(--borde); border-radius: 12px; padding: 16px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s; background: #fff; }
.opcion-nivel.seleccionado { border-color: var(--naranja); background: var(--naranja-light); }
.opcion-nivel.no-disponible { opacity: 0.5; cursor: not-allowed; background: var(--gris); }
.nivel-titulo { font-size: 17px; font-weight: 800; color: var(--texto); }
.nivel-detalle { font-size: 14px; color: var(--texto-suave); margin-top: 4px; }
.nivel-fecha { font-size: 14px; color: var(--naranja); font-weight: 600; margin-top: 6px; }
.alerta-nivel { font-size: 13px; color: #856404; background: #fff3cd; border-radius: 8px; padding: 10px 12px; margin-top: 10px; display: none; line-height: 1.5; }
.opcion-nivel.seleccionado .alerta-nivel { display: block; }
.radio-grupo { display: flex; gap: 16px; margin-top: 8px; }
.radio-option { flex: 1; border: 2px solid var(--borde); border-radius: 10px; padding: 14px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 16px; font-weight: 600; transition: all 0.2s; }
.radio-option input { width: 20px; height: 20px; accent-color: var(--naranja); flex-shrink: 0; }
.radio-option:has(input:checked) { border-color: var(--naranja); background: var(--naranja-light); }
.bloqueo-menor { display: none; background: #f8d7da; border-radius: 10px; padding: 14px; margin-top: 10px; font-size: 14px; color: #721c24; line-height: 1.5; }
.termino-bloque { border: 2px solid var(--borde); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
.termino-texto { font-size: 14px; color: var(--texto-suave); line-height: 1.6; margin-bottom: 14px; }
.checkbox-grupo { display: flex; align-items: center; gap: 12px; }
.checkbox-grupo input[type=checkbox] { width: 22px; height: 22px; accent-color: var(--naranja); flex-shrink: 0; cursor: pointer; }
.checkbox-grupo label { font-size: 15px; font-weight: 700; color: var(--texto); cursor: pointer; }
.alerta-timer { background: #fff3cd; border-left: 4px solid var(--naranja); padding: 14px 16px; border-radius: 10px; font-size: 15px; color: #856404; margin-bottom: 20px; line-height: 1.5; }
.btn-enviar { width: 100%; background: var(--naranja); color: #fff; border: none; padding: 18px; border-radius: 12px; font-size: 18px; font-weight: 800; font-family: 'Nunito', sans-serif; cursor: pointer; transition: background 0.2s; }
.btn-enviar:hover { background: var(--naranja-dark); }
.btn-enviar:disabled { background: #ccc; cursor: not-allowed; }
.error-msg { color: var(--error); font-size: 13px; margin-top: 6px; display: none; font-weight: 600; }
#nivel-error { color: var(--error); font-size: 13px; margin-top: 6px; display: none; font-weight: 600; }
.loading { text-align: center; padding: 40px 20px; color: var(--texto-suave); font-size: 16px; }
.spinner { width: 40px; height: 40px; border: 4px solid #f0f0f0; border-top-color: var(--naranja); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
a { color: var(--naranja); }
</style>
</head>
<body>
<div class="container" id="app">
  <div class="loading">
    <div class="spinner"></div>
    Cargando disponibilidad...
  </div>
</div>

<script>
var URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwv4CTAQQY3rnERKJ9jzKEcZx5RkToOQxAmkmLnx2FmI6ncU2rhe5l9tCMynDDqfuS_/exec";
var telefono = new URLSearchParams(window.location.search).get('telefono') || '';
if (telefono && !telefono.startsWith('+')) telefono = '+' + telefono.replace(/\D/g, '');

var nivelElegido = null;
var grupoElegido = null;
var fechaElegida = null;
var tipoElegido = null;

var NIVELES = {
  A1: 'Principiante', A2: 'Básico', B1: 'Intermedio',
  B2: 'Intermedio Alto', C1: 'Avanzado', C2: 'Maestría'
};

// Cargar estado y disponibilidad al abrir
Promise.all([
  fetch(URL_SCRIPT + '?accion=VERIFICAR_ESTADO&telefono=' + encodeURIComponent(telefono)).then(r => r.json()),
  fetch(URL_SCRIPT + '?accion=GET_DISPONIBILIDAD').then(r => r.json())
]).then(function([estado, disp]) {
  if (estado.bloqueado) {
    mostrarMensaje('Acceso bloqueado', 'Tu acceso está bloqueado. Contactá a un asesor desde el menú de WhatsApp.');
    return;
  }
  if (estado.pendiente) {
    mostrarMensaje('Inscripción pendiente', 'Ya tenés una inscripción pendiente. Enviá el comprobante de pago por WhatsApp.');
    return;
  }
  renderFormulario(disp.grupos, disp.proximas);
}).catch(function() {
  mostrarMensaje('Error', 'No se pudo cargar el formulario. Intentá de nuevo más tarde.');
});

function mostrarMensaje(titulo, texto) {
  document.getElementById('app').innerHTML =
    '<div style="padding:20px"><h2 style="color:var(--naranja);margin-bottom:12px">' + titulo + '</h2><p>' + texto + '</p></div>';
}

function renderFormulario(grupos, proximas) {
  var ORDEN = ['A1','A2','B1','B2','C1','C2'];
  var opcionesHTML = '';

  ORDEN.forEach(function(cod) {
    var nombre = NIVELES[cod];
    var gruposDelNivel = grupos.filter(function(g) { return g.nivel === cod; });

    if (gruposDelNivel.length > 0) {
      gruposDelNivel.forEach(function(grupo) {
        var alertaA2 = cod !== 'A1'
          ? '<div class="alerta-nivel">⚠️ Nuestro método es único, te recomendamos empezar desde Principiante (A1) aunque tengas algo de conocimiento del idioma. Sin embargo podés inscribirte directamente desde este nivel.</div>'
          : '';
        opcionesHTML += '<div class="opcion-nivel" onclick="elegirNivel(this)" '
          + 'data-nivel="' + cod + '" data-grupo="' + grupo.hoja + '" '
          + 'data-fecha="' + grupo.fechaInicioDisplay + '" data-tipo="' + grupo.tipo + '">'
          + '<div class="nivel-titulo">' + nombre + ' (' + cod + ')</div>'
          + '<div class="nivel-detalle">' + grupo.textoDisplay.replace(nombre + ' (' + cod + ') — ', '') + '</div>'
          + '<div class="nivel-fecha">📅 Fecha de inicio: ' + grupo.fechaInicioDisplay + '</div>'
          + alertaA2 + '</div>';
      });
    } else if (proximas && proximas[cod]) {
      opcionesHTML += '<div class="opcion-nivel no-disponible">'
        + '<div class="nivel-titulo">' + nombre + ' (' + cod + ')</div>'
        + '<div class="nivel-detalle">Sin disponibilidad</div>'
        + '<div class="nivel-fecha">🗓️ Próxima apertura: ' + proximas[cod].fechaAperturaStr + '</div>'
        + '<div class="nivel-fecha">📋 Inscripciones abiertas desde: ' + proximas[cod].fechaInscripciones + '</div>'
        + '</div>';
    } else {
      opcionesHTML += '<div class="opcion-nivel no-disponible">'
        + '<div class="nivel-titulo">' + nombre + ' (' + cod + ')</div>'
        + '<div class="nivel-detalle">Sin disponibilidad</div>'
        + '</div>';
    }
  });

  document.getElementById('app').innerHTML = `
    <img src="https://institutoistanbul.ar/images/logo.png" class="logo" onerror="this.style.display='none'">
    <h1>Inscripción a Instituto İstanbul 🇹🇷</h1>
    <p class="subtitulo">Completá el formulario para reservar tu lugar.</p>

    <div class="seccion">
      <div class="seccion-titulo">Elegí tu nivel</div>
      ${opcionesHTML}
      <div id="nivel-error" class="error-msg">Por favor elegí un nivel disponible.</div>
    </div>

    <div class="seccion">
      <div class="seccion-titulo">Nombre y apellido *</div>
      <input type="text" id="nombre" placeholder="Ej: María González">
      <p class="hint">Te llamaremos por tu primer nombre.</p>
      <div id="error-nombre" class="error-msg">Ingresá tu nombre completo.</div>
    </div>

    <div class="seccion">
      <div class="seccion-titulo">Tu número de WhatsApp</div>
      <input type="text" id="telefono" value="${telefono}" readonly>
    </div>

    <div class="seccion">
      <div class="seccion-titulo">Email (debe ser Gmail) *</div>
      <input type="email" id="email" placeholder="ejemplo@gmail.com">
      <div id="error-email" class="error-msg">Ingresá un email de Gmail válido (@gmail.com).</div>
    </div>

    <div class="seccion">
      <div class="seccion-titulo">¿En qué ciudad y país te encontrás? *</div>
      <input type="text" id="localidad" placeholder="Ej: Buenos Aires, Argentina">
      <div id="error-localidad" class="error-msg">Ingresá tu ciudad y país.</div>
    </div>

    <div class="seccion">
      <div class="seccion-titulo">¿Sos menor de edad? *</div>
      <div class="radio-grupo">
        <label class="radio-option"><input type="radio" name="menor" value="no"> No</label>
        <label class="radio-option"><input type="radio" name="menor" value="si"> Sí</label>
      </div>
      <div id="error-menor" class="error-msg">Debés responder esta pregunta.</div>
      <div id="bloqueo-menor" class="bloqueo-menor">No podés inscribirte siendo menor de edad. Por favor contactá la administración solicitando un asesor desde el menú de WhatsApp.</div>
    </div>

    <div class="seccion">
      <div class="seccion-titulo">Método de pago *</div>
      <select id="metodopago">
        <option value="">— Seleccioná una opción —</option>
        <option value="ARG_TRANSFER">en Argentina por Transferencia Bancaria</option>
        <option value="ARG_MP">en Argentina por Mercado Pago</option>
        <option value="TUR_TRANSFER">en Turquía por Transferencia Bancaria</option>
        <option value="PAYPAL">por PayPal. Estoy en otra localidad</option>
      </select>
      <div id="error-metodo" class="error-msg">Seleccioná un método de pago.</div>
    </div>

    <div class="seccion">
      <div class="seccion-titulo">Contraseña de acceso *</div>
      <input type="text" id="contrasena" placeholder="Ingresá la contraseña que recibiste">
      <div id="error-contrasena" class="error-msg">Contraseña incorrecta o expirada. Volvé al menú de WhatsApp.</div>
    </div>

    <div class="seccion">
      <div class="seccion-titulo">Términos y condiciones *</div>
      <div class="termino-bloque">
        <div class="termino-texto">ACCESO A LOS MATERIALES<br>Tu texto acá.</div>
        <div class="checkbox-grupo">
          <input type="checkbox" id="check-materiales">
          <label for="check-materiales">He leído y acepto.</label>
        </div>
      </div>
      <div class="termino-bloque">
        <div class="termino-texto">ASISTENCIA DEL PROFESOR<br>Tu texto acá.</div>
        <div class="checkbox-grupo">
          <input type="checkbox" id="check-asistencia">
          <label for="check-asistencia">He leído y acepto.</label>
        </div>
      </div>
      <div class="termino-bloque">
        <div class="termino-texto">POLÍTICA DE PAGO<br>Tu texto acá. <a href="https://institutoistanbul.ar/pp.html" target="_blank">Ver política completa</a></div>
        <div class="checkbox-grupo">
          <input type="checkbox" id="check-pago">
          <label for="check-pago">He leído y acepto.</label>
        </div>
      </div>
      <div id="error-checks" class="error-msg">Debés aceptar todos los términos para continuar.</div>
    </div>

    <div class="alerta-timer">⏰ ❗ Tenés 15 minutos para abonar y enviarnos el comprobante. Pasado ese tiempo, la inscripción se cancela automáticamente y no podrás volver a hacerlo.</div>

    <button class="btn-enviar" onclick="enviarFormulario()">Enviar</button>
  `;

  // Eventos
  document.querySelectorAll('input[name=menor]').forEach(function(r) {
    r.addEventListener('change', function() {
      document.getElementById('bloqueo-menor').style.display = this.value === 'si' ? 'block' : 'none';
    });
  });
}

function elegirNivel(el) {
  if (el.classList.contains('no-disponible')) return;
  document.querySelectorAll('.opcion-nivel').forEach(function(e) { e.classList.remove('seleccionado'); });
  el.classList.add('seleccionado');
  nivelElegido = el.dataset.nivel;
  grupoElegido = el.dataset.grupo;
  fechaElegida = el.dataset.fecha;
  tipoElegido = el.dataset.tipo;
}

function enviarFormulario() {
  var ok = true;
  document.querySelectorAll('.error-msg').forEach(function(e) { e.style.display = 'none'; });

  if (!nivelElegido) { document.getElementById('nivel-error').style.display = 'block'; ok = false; }

  var nombre = document.getElementById('nombre').value.trim();
  if (!nombre) { document.getElementById('error-nombre').style.display = 'block'; ok = false; }

  var email = document.getElementById('email').value.trim().toLowerCase();
  if (!email.endsWith('@gmail.com')) { document.getElementById('error-email').style.display = 'block'; ok = false; }

  var localidad = document.getElementById('localidad').value.trim();
  if (!localidad) { document.getElementById('error-localidad').style.display = 'block'; ok = false; }

  var menorVal = document.querySelector('input[name=menor]:checked');
  if (!menorVal) { document.getElementById('error-menor').style.display = 'block'; ok = false; }
  else if (menorVal.value === 'si') { ok = false; }

  var metodo = document.getElementById('metodopago').value;
  if (!metodo) { document.getElementById('error-metodo').style.display = 'block'; ok = false; }

  var contrasena = document.getElementById('contrasena').value.trim();
  if (!contrasena) { document.getElementById('error-contrasena').style.display = 'block'; ok = false; }

  if (!document.getElementById('check-materiales').checked ||
      !document.getElementById('check-asistencia').checked ||
      !document.getElementById('check-pago').checked) {
    document.getElementById('error-checks').style.display = 'block'; ok = false;
  }

  if (!ok) return;

  var btn = document.querySelector('.btn-enviar');
  btn.disabled = true;
  btn.textContent = 'Enviando...';

  fetch(URL_SCRIPT, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      accion: 'NUEVA_INSCRIPCION',
      telefono: telefono,
      nombre: nombre,
      email: email,
      localidad: localidad,
      metodopago: metodo,
      contrasena: contrasena,
      nivel: nivelElegido,
      grupo: grupoElegido,
      fechaInicio: fechaElegida,
      tipo: tipoElegido
    })
  }).then(function(r) { return r.text(); })
  .then(function(resp) {
    if (resp === 'OK') {
      document.getElementById('app').innerHTML =
        '<div style="padding:24px;text-align:center">'
        + '<div style="font-size:48px;margin-bottom:16px">🎉</div>'
        + '<h2 style="color:var(--naranja);margin-bottom:12px">¡Gracias por inscribirte!</h2>'
        + '<p style="color:var(--texto-suave);font-size:16px">En breve recibís un WhatsApp con los datos para el pago. Tenés 15 minutos para enviarnos el comprobante.</p>'
        + '</div>';
    } else {
      btn.disabled = false;
      btn.textContent = 'Enviar';
      alert('Error: ' + resp);
    }
  }).catch(function() {
    btn.disabled = false;
    btn.textContent = 'Enviar';
    alert('Error de conexión. Intentá de nuevo.');
  });
}
</script>
</body>
</html>
